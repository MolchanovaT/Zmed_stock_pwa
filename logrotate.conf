# Конфигурация ротации логов для zmed_stock_implants_pwa
# Установка: sudo cp logrotate.conf /etc/logrotate.d/zmed
# Или разовый запуск: logrotate -f logrotate.conf

/путь/к/проекту/*.log {
    daily           # ротация раз в день
    rotate 14       # хранить 14 файлов (2 недели)
    compress        # сжимать старые логи (.gz)
    delaycompress   # предыдущий лог сжимать только на следующий раз
    missingok       # не ошибаться, если файл не существует
    notifempty      # не ротировать пустые файлы
    copytruncate    # скопировать и обнулить (без перезапуска процесса)
}
