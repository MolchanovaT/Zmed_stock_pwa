<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Загрузка остатков</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<h2>📦 Загрузка файла остатков</h2>

{% with m = get_flashed_messages(with_categories=true) %}
{% for cat, txt in m %}
<div class="alert alert-{{ 'danger' if cat=='error' else cat }} alert-dismissible fade show">
    {{ txt }}
    <button class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endwith %}

<form method="post" enctype="multipart/form-data" class="mb-4 row g-2">
    <div class="col-auto">
        <input class="form-control" type="file"
               name="file" accept=".csv,.txt,.xls,.xlsx,.zip" required>
    </div>

    <div class="col-auto">
        <select class="form-select" name="src">
            <option value="main">Центральный склад</option>
            <option value="remote">Удалённые склады</option>
        </select>
    </div>

    <div class="col-auto">
        <button class="btn btn-primary">Загрузить</button>
    </div>
</form>

<hr>

<h4>👥 Пользователи PWA</h4>

<table class="table table-sm table-striped align-middle">
    <thead>
    <tr>
        <th>Логин</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    {% for u in pwa_users %}
    <tr>
        <td>{{ u.username }}</td>
        <td style="width:1%">
            <form action="{{ url_for('user_del', user_id=u.id) }}" method="post"
                  onsubmit="return confirm('Удалить пользователя {{ u.username }}?');">
                <button class="btn btn-danger btn-sm">🗑</button>
            </form>
        </td>
    </tr>
    {% else %}
    <tr>
        <td colspan="2"><em>Список пуст</em></td>
    </tr>
    {% endfor %}
    </tbody>
</table>

<form class="row g-2" action="{{ url_for('user_add') }}" method="post">
    <div class="col-auto">
        <input class="form-control" type="text" name="username" placeholder="Логин" required>
    </div>
    <div class="col-auto">
        <input class="form-control" type="password" name="password" placeholder="Пароль" required>
    </div>
    <div class="col-auto">
        <button class="btn btn-success">Добавить</button>
    </div>
</form>

</body>
</html>
